name: Build and Publish to PyPI

on:
  push:
    tags:
      - "v*"  # 当推送 v 开头的 tag 时触发，如 v1.0.0

jobs:
  # ============================================================
  # Job 1: 使用 cibuildwheel 在三大平台上构建 wheel
  # ============================================================
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # ---- 安装 gfortran ----
      # Linux: 自带 gfortran，无需额外安装
      # macOS: 通过 brew 安装
      # Windows: 通过 MSYS2 安装 mingw-w64 gfortran
      - name: Install gfortran (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc

      - name: Install gfortran (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran

      - name: Add MSYS2 gfortran to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "D:/a/_temp/msys64/mingw64/bin" >> $GITHUB_PATH

      # ---- 构建 wheel ----
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          # 只构建 CPython 3.10, 3.11, 3.12
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          # 跳过 32 位和 musl Linux（一般不需要）
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          # Linux 容器内安装 gfortran
          CIBW_BEFORE_BUILD_LINUX: >
            yum install -y gcc-gfortran || apt-get update && apt-get install -y gfortran
          # macOS 构建前确保 gfortran 可用
          CIBW_BEFORE_BUILD_MACOS: >
            brew install gcc || true
          # Windows 构建前确保 gfortran 在 PATH 中
          CIBW_ENVIRONMENT_WINDOWS: >
            PATH="D:\\a\\_temp\\msys64\\mingw64\\bin;$PATH"
          # 构建 macOS 的 x86_64
          CIBW_ARCHS_MACOS: "x86_64"
          # Linux 仅构建 x86_64
          CIBW_ARCHS_LINUX: "x86_64"
          # Windows 仅构建 AMD64
          CIBW_ARCHS_WINDOWS: "AMD64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ============================================================
  # Job 2: 构建 sdist（源码分发包）
  # ============================================================
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ============================================================
  # Job 3: 发布到 PyPI（使用 Trusted Publisher）
  # ============================================================
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # 重要：这是 Trusted Publisher 所必需的
    environment:
      name: pypi
      url: https://pypi.org/p/pygrnwang
    permissions:
      id-token: write  # Trusted Publisher 需要 OIDC token

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 无需指定 password，Trusted Publisher 自动处理认证