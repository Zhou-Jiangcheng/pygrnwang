name: Build and Publish to PyPI
on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.cibw_arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_arch: "x86_64"
          - os: windows-latest
            cibw_arch: "AMD64"
          - os: macos-latest
            cibw_arch: "arm64"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Pre-install build tools
        run: |
          python -m pip install --upgrade pip
          pip install virtualenv cibuildwheel

      # ---- gfortran ----
      - name: Install gfortran (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran

      - name: Add MSYS2 gfortran to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "D:/a/_temp/msys64/mingw64/bin" >> $GITHUB_PATH

      # ---- build wheel ----
      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_BEFORE_BUILD_LINUX: >
            yum install -y gcc-gfortran glibc-static || (apt-get update && apt-get install -y gfortran libc6-dev)
          CIBW_BEFORE_BUILD_MACOS: >
            brew install gcc && ln -sf /opt/homebrew/bin/gfortran-* /opt/homebrew/bin/gfortran
          CIBW_ENVIRONMENT_WINDOWS: >
            PATH="D:\\a\\_temp\\msys64\\mingw64\\bin;$PATH"
          CIBW_ENVIRONMENT_MACOS: >
            PATH="/opt/homebrew/bin:$PATH"
          CIBW_ARCHS: ${{ matrix.cibw_arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pygrnwang
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1