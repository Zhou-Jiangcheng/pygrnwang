name: Build and Publish to PyPI

on:
  push:
    tags:
      - "v*"  # 当推送 v 开头的 tag 时触发，如 v1.0.0

jobs:
  # ============================================================
  # Job 1: 使用 cibuildwheel 在三大平台上构建 wheel
  # ============================================================
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.cibw_arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_arch: "x86_64"
          - os: windows-latest
            cibw_arch: "AMD64"
          - os: macos-latest  # Apple Silicon Mac (ARM64)
            cibw_arch: "arm64"

    steps:
      - uses: actions/checkout@v4

      # ---- 设置 Python 并预装 virtualenv（避免 cibuildwheel 下载 virtualenv.pyz 被限流 429）----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pre-install build tools (avoid virtualenv.pyz 429 error)
        run: |
          python -m pip install --upgrade pip
          pip install virtualenv cibuildwheel

      # ---- 安装 gfortran ----
      - name: Install gfortran (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc || true
          # 找到已安装的带有版本号的 gfortran (例如 gfortran-14, gfortran-15)
          GFORTRAN_BIN=$(ls $(brew --prefix)/bin/gfortran-[0-9]* | sort -V | tail -n 1)
          # 创建一个无版本号的软链接，以便 setup.py 能够识别
          ln -sf "$GFORTRAN_BIN" $(brew --prefix)/bin/gfortran
          # 验证 gfortran 是否可用
          gfortran --version

      - name: Install gfortran (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran

      - name: Add MSYS2 gfortran to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "D:/a/_temp/msys64/mingw64/bin" >> $GITHUB_PATH

      # ---- 构建 wheel ----
      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          
          CIBW_BEFORE_BUILD_LINUX: >
            yum install -y gcc-gfortran glibc-static || (apt-get update && apt-get install -y gfortran libc6-dev)
          
          CIBW_BEFORE_BUILD_MACOS: >
            brew install gcc || true
          
          CIBW_ENVIRONMENT_WINDOWS: >
            PATH="D:\\a\\_temp\\msys64\\mingw64\\bin;$PATH"
          
          # 动态设置当前 Job 的目标架构
          CIBW_ARCHS: ${{ matrix.cibw_arch }}

      - uses: actions/upload-artifact@v4
        with:
          # 加上架构后缀，防止同名 artifacts 冲突
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_arch }}
          path: ./wheelhouse/*.whl

  # ============================================================
  # Job 2: 构建 sdist（源码分发包）
  # ============================================================
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ============================================================
  # Job 3: 发布到 PyPI（使用 Trusted Publisher）
  # ============================================================
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pygrnwang
    permissions:
      id-token: write 

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1